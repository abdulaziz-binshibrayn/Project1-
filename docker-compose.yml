services:
  mongo:
    image: mongo:6
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - '27018:27017'
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongo:27017/local --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - mongo_data:/data/db
    networks:
      - task

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
    depends_on:
      - zookeeper
    networks:
      - task

  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: zookeeper
    ports:
      - '2181:2181'
    environment:
      ALLOW_ANONYMOUS_LOGIN: ${ALLOW_ANONYMOUS_LOGIN}
    networks:
      - task
  data-retrieval:
   container_name: data-retrieval
   build:
    context: .
    dockerfile: src/data-retrieval/Dockerfile
   ports:
    - '3000:3000'
   depends_on:
    - kafka
   networks:
    - task
   env_file:
    - .env
   environment:
    SERVICE_ROLE: retrieval

  data-insertion:
   container_name: data-insertion
   build:
     context: .
     dockerfile: src/data-insertion/Dockerfile
   ports:
     - '4000:4000'
   depends_on:
     kafka:
       condition: service_started
     mongo:
       condition: service_healthy
   networks:
     - task
   env_file:
     - .env
   environment:
     SERVICE_ROLE: insertion

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
    ports:
      - '9200:9200'
      - '9300:9300'
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - task

volumes:
  mongo_data:

networks:
  task:
    name: task
    driver: bridge